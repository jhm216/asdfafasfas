<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>QuizN — 호스트</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="/socket.io/socket.io.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --bg:   #09090f;
  --s1:   rgba(255,255,255,.06);
  --bd:   rgba(255,255,255,.1);
  --p:    #7c3aed;
  --p-lt: #a78bfa;
  --p-glow:rgba(124,58,237,.25);
  --tx:   #f1f5f9;
  --dim:  #94a3b8;
  --mute: #475569;
}

html, body { height:100%; }
body {
  font-family:'Outfit',-apple-system,sans-serif;
  background:var(--bg);
  color:var(--tx);
  min-height:100vh;
  padding:32px;
  background-image:
    radial-gradient(ellipse 70% 50% at 0% 0%,   rgba(124,58,237,.2)  0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 100% 100%,rgba(6,182,212,.08)  0%,transparent 50%);
}
.wrap { max-width:1200px; margin:0 auto; }

/* ════════════════ SETUP ════════════════ */
#setup {
  min-height:calc(100vh - 64px);
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:0;
}
.setup-logo {
  display:flex;align-items:center;gap:18px;
  margin-bottom:16px;
}
.setup-icon {
  width:68px;height:68px;
  background:linear-gradient(135deg,var(--p),#6d28d9);
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:34px;
  box-shadow:0 8px 36px var(--p-glow);
}
.setup-name {
  font-size:clamp(40px,6vw,60px);
  font-weight:900;
  letter-spacing:-2px;
  background:linear-gradient(120deg,#fff 30%,var(--p-lt));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.setup-sub {
  font-size:17px;
  color:var(--dim);
  margin-bottom:48px;
}
.setup-btn {
  background:linear-gradient(135deg,#7c3aed,#6d28d9);
  color:#fff;
  border:none;
  border-radius:16px;
  padding:20px 64px;
  font-family:inherit;
  font-size:20px;
  font-weight:800;
  cursor:pointer;
  letter-spacing:.02em;
  box-shadow:0 8px 32px var(--p-glow);
  transition:transform .15s,box-shadow .2s;
}
.setup-btn:hover { transform:translateY(-3px);box-shadow:0 14px 42px rgba(124,58,237,.55); }

/* ════════════════ LOBBY ════════════════ */
#lobby {
  gap:28px;
  align-items:start;
}
.pin-panel {
  background:var(--s1);
  border:1px solid var(--bd);
  border-radius:24px;
  padding:40px 36px;
  text-align:center;
  position:sticky;
  top:32px;
}
.pin-eyebrow {
  font-size:12px;
  font-weight:700;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--dim);
  margin-bottom:20px;
}
.pin-num {
  font-size:clamp(56px,9vw,96px);
  font-weight:900;
  letter-spacing:10px;
  background:linear-gradient(to bottom,#fff,var(--p-lt));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
  margin-bottom:20px;
}
.pin-hint {
  font-size:13px;
  color:var(--mute);
  line-height:1.7;
}
.pin-hint strong { color:var(--dim); }

.right-col { display:flex;flex-direction:column;gap:20px; }

.players-card {
  background:var(--s1);
  border:1px solid var(--bd);
  border-radius:20px;
  padding:24px;
}
.players-hd {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
}
.players-hd h3 {
  font-size:12px;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--dim);
}
.p-count {
  background:rgba(124,58,237,.2);
  border:1px solid rgba(167,139,250,.25);
  color:var(--p-lt);
  padding:4px 12px;
  border-radius:100px;
  font-size:13px;
  font-weight:800;
}
.pchips { display:flex;flex-wrap:wrap;gap:8px;min-height:36px; }
.pchip {
  background:rgba(255,255,255,.07);
  border:1px solid var(--bd);
  color:var(--tx);
  padding:7px 16px;
  border-radius:100px;
  font-size:15px;
  font-weight:700;
  animation:chipIn .2s ease;
}
@keyframes chipIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.empty-hint { color:var(--mute);font-size:14px;font-style:italic; }

.start-btn {
  width:100%;
  background:linear-gradient(135deg,#7c3aed,#6d28d9);
  color:#fff;
  border:none;
  border-radius:16px;
  padding:22px;
  font-family:inherit;
  font-size:19px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 6px 24px var(--p-glow);
  transition:transform .15s,box-shadow .2s,opacity .2s;
  letter-spacing:.02em;
}
.start-btn:hover:not(:disabled) { transform:translateY(-2px);box-shadow:0 12px 36px rgba(124,58,237,.55); }
.start-btn:disabled { opacity:.3;cursor:not-allowed; }

/* ════════════════ COUNTDOWN ════════════════ */
#countdown {
  position:fixed;inset:0;
  background:var(--bg);
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:99;
}
.cnum {
  font-size:clamp(160px,24vw,320px);
  font-weight:900;
  line-height:1;
  background:linear-gradient(to bottom,#fff 20%,var(--p-lt));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:cdAnim .9s ease-out forwards;
  filter:drop-shadow(0 0 80px rgba(167,139,250,.35));
}
@keyframes cdAnim {
  0%   { transform:scale(2.5);opacity:0; }
  35%  { transform:scale(1);  opacity:1; }
  100% { transform:scale(.4); opacity:0; }
}
.cnum-lbl {
  margin-top:24px;
  font-size:15px;
  font-weight:700;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--mute);
}

/* ════════════════ QUESTION ════════════════ */
.q-hd {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
.q-prog {
  font-size:13px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--dim);
}
.t-track {
  height:10px;
  background:rgba(255,255,255,.1);
  border-radius:100px;
  overflow:hidden;
  margin-bottom:28px;
}
.t-fill {
  height:100%;
  border-radius:100px;
  background:#10b981;
}
.q-text {
  background:rgba(255,255,255,.07);
  border:1px solid var(--bd);
  border-radius:20px;
  padding:48px 40px;
  font-size:clamp(22px,3.5vw,40px);
  font-weight:700;
  text-align:center;
  line-height:1.4;
  margin-bottom:24px;
}
.choices {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.choice {
  border-radius:18px;
  padding:28px 24px;
  display:flex;
  align-items:center;
  gap:14px;
  font-size:clamp(16px,2vw,24px);
  font-weight:800;
  color:#fff;
}
.choice .sh { font-size:1.3em;opacity:.85;flex-shrink:0; }
.choice.c0 { background:linear-gradient(135deg,#ef4444,#b91c1c); }
.choice.c1 { background:linear-gradient(135deg,#3b82f6,#1d4ed8); }
.choice.c2 { background:linear-gradient(135deg,#f59e0b,#b45309); }
.choice.c3 { background:linear-gradient(135deg,#22c55e,#15803d); }
.q-prog-info {
  text-align:center;
  margin-top:20px;
  font-size:16px;
  font-weight:700;
  color:var(--dim);
}

/* ════════════════ ANSWER REVEAL ════════════════ */
#answering {
  min-height:calc(100vh - 64px);
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.rev-eyebrow {
  font-size:14px;
  font-weight:700;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--dim);
  margin-bottom:28px;
}
.rev-answer {
  background:linear-gradient(135deg,#10b981,#059669);
  border-radius:28px;
  padding:52px 80px;
  font-size:clamp(32px,5.5vw,68px);
  font-weight:900;
  max-width:900px;
  box-shadow:0 24px 80px rgba(16,185,129,.32);
  animation:answerPop .5s cubic-bezier(.34,1.56,.64,1);
  word-break:keep-all;
}
@keyframes answerPop { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }

/* ════════════════ RANKING ════════════════ */
.ranking-hd {
  text-align:center;
  font-size:clamp(26px,4vw,44px);
  font-weight:900;
  margin-bottom:32px;
}
.rlist { display:flex;flex-direction:column;gap:12px;max-width:900px;margin:0 auto; }
.rrow {
  display:flex;
  align-items:center;
  gap:20px;
  padding:18px 28px;
  background:var(--s1);
  border:1px solid var(--bd);
  border-radius:18px;
  animation:slideIn .5s ease both;
}
@keyframes slideIn { from{transform:translateX(-20px);opacity:0} to{transform:translateX(0);opacity:1} }
.rrow.t1 { background:linear-gradient(135deg,rgba(250,204,21,.18),rgba(245,158,11,.08));border-color:rgba(250,204,21,.38); }
.rrow.t2 { background:linear-gradient(135deg,rgba(226,232,240,.1),rgba(203,213,225,.05));border-color:rgba(226,232,240,.18); }
.rrow.t3 { background:linear-gradient(135deg,rgba(253,186,116,.14),rgba(249,115,22,.07));border-color:rgba(253,186,116,.28); }
.rmedal { font-weight:900;min-width:52px;text-align:center;flex-shrink:0; }
.rrow.t1 .rmedal { font-size:38px; }
.rrow.t2 .rmedal { font-size:32px; }
.rrow.t3 .rmedal { font-size:26px; }
.rrow:not(.t1):not(.t2):not(.t3) .rmedal { font-size:20px;color:var(--dim); }
.rnick { flex:1;font-weight:800; }
.rrow.t1 .rnick { font-size:clamp(22px,3.8vw,42px); }
.rrow.t2 .rnick { font-size:clamp(18px,3vw,34px); }
.rrow.t3 .rnick { font-size:clamp(16px,2.4vw,28px); }
.rrow:not(.t1):not(.t2):not(.t3) .rnick { font-size:20px; }
.rscore { font-weight:900;color:var(--p-lt);flex-shrink:0; }
.rrow.t1 .rscore { font-size:clamp(18px,2.8vw,34px); }
.rrow.t2 .rscore { font-size:clamp(16px,2.2vw,28px); }
.rrow:not(.t1):not(.t2):not(.t3) .rscore { font-size:18px; }

/* ════════════════ ENDED ════════════════ */
#ended { background:#000; }

.win-stage {
  position: relative;
  width: 100%;
  min-height: calc(100vh - 64px);
  display: flex;
  align-items: center;
  justify-content: center;
}
.win-video {
  width: 100%;
  max-height: calc(100vh - 64px);
  display: block;
  object-fit: contain;
}
.win-overlay {
  position: absolute;

  /* ↓↓↓ 이름 위치 여기서 조정 ↓↓↓ */
  bottom: 12%;
  left: 50%;
  transform: translateX(-50%);
  /* ↑↑↑ 여기까지 ↑↑↑ */

  text-align: center;
  pointer-events: none;
  white-space: nowrap;
}
.win-name {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 2px 12px rgba(0,0,0,.9), 0 0 40px rgba(0,0,0,.6);
  line-height: 1.7;
}
.win-name.r1 { font-size: clamp(28px,5vw,60px);  color: #fbbf24; }
.win-name.r2 { font-size: clamp(22px,3.5vw,44px); color: #e2e8f0; }
.win-name.r3 { font-size: clamp(18px,2.8vw,36px); color: #fb923c; }
.win-name.rx { font-size: clamp(14px,2vw,26px);   color: rgba(255,255,255,.75); }

/* ════════════════ VISIBILITY ════════════════ */
#setup,#lobby,#countdown,#playing,#answering,#ranking,#ended { display:none; }
#setup.active   { display:flex; }
#lobby.active   { display:grid;grid-template-columns:1fr 1.45fr; }
#countdown.active,#answering.active { display:flex; }
#playing.active,#ranking.active,#ended.active { display:block; }
</style>
</head>
<body>
<div class="wrap">

  <!-- SETUP -->
  <div id="setup" class="active">
    <div class="setup-logo">
      <div class="setup-icon">🎯</div>
      <div class="setup-name">QuizN</div>
    </div>
    <p class="setup-sub">실시간 퀴즈 플랫폼</p>
    <button class="setup-btn" id="createBtn">새 게임 만들기</button>
  </div>

  <!-- LOBBY -->
  <div id="lobby">
    <div class="pin-panel">
      <div class="pin-eyebrow">게임 PIN</div>
      <div class="pin-num" id="pinDisplay">------</div>
      <div class="pin-hint">
        <strong>game.hansei.cam</strong> 접속 후<br>
        위 PIN을 입력하세요
      </div>
    </div>
    <div class="right-col">
      <div class="players-card">
        <div class="players-hd">
          <h3>참가자</h3>
          <span class="p-count" id="playerCount">0명</span>
        </div>
        <div class="pchips" id="playerList">
          <span class="empty-hint">플레이어를 기다리는 중...</span>
        </div>
      </div>
      <button class="start-btn" id="startBtn" disabled>퀴즈 시작하기</button>
    </div>
  </div>

  <!-- COUNTDOWN -->
  <div id="countdown">
    <div class="cnum" id="countdownNum">3</div>
    <div class="cnum-lbl">Game Start</div>
  </div>

  <!-- QUESTION -->
  <div id="playing">
    <div class="q-hd">
      <span class="q-prog" id="qProgress">문제 1 / 5</span>
    </div>
    <div class="t-track"><div class="t-fill" id="timerBar"></div></div>
    <div class="q-text" id="qText"></div>
    <div class="choices" id="qChoices"></div>
    <div class="q-prog-info" id="qProgressInfo"></div>
  </div>

  <!-- ANSWER REVEAL -->
  <div id="answering">
    <div class="rev-eyebrow">정 답</div>
    <div class="rev-answer" id="bigAnswer"></div>
  </div>

  <!-- RANKING -->
  <div id="ranking">
    <div class="ranking-hd" id="rankingTitle">🏆 현재 순위</div>
    <div class="rlist" id="rankList"></div>
  </div>

  <!-- ENDED -->
  <div id="ended">
    <div class="win-stage">
      <video id="winVideo" class="win-video" src="/win.mp4" playsinline></video>
      <div class="win-overlay" id="winOverlay"></div>
    </div>
  </div>

</div>
<script>
const socket = io();
const $ = id => document.getElementById(id);
const show = id => {
  ['setup','lobby','countdown','playing','answering','ranking','ended']
    .forEach(s => $(s).classList.remove('active'));
  $(id).classList.add('active');
};

let tLimit = 30, timerRAF = null, qStartTs = 0;

$('createBtn').onclick = async () => {
  const res = await fetch('/api/rooms', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
  const { pin } = await res.json();
  socket.emit('host:join', { pin });
};

socket.on('host:joined', ({ pin, players }) => {
  $('pinDisplay').textContent = pin;
  renderPlayers(players);
  show('lobby');
});

socket.on('host:players', renderPlayers);

function renderPlayers(players) {
  $('playerCount').textContent = players.length + '명';
  $('playerList').innerHTML = players.length
    ? players.map(p => `<span class="pchip">${esc(p.nick)}</span>`).join('')
    : '<span class="empty-hint">플레이어를 기다리는 중...</span>';
  $('startBtn').disabled = players.length === 0;
}

$('startBtn').onclick = () => socket.emit('host:start');

socket.on('countdown:tick', ({ count }) => {
  show('countdown');
  const el = $('countdownNum');
  el.textContent = count;
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = '';
});

socket.on('question:show', ({ index, total, q, choices, timeLimit }) => {
  tLimit = timeLimit;
  $('qProgress').textContent = `문제 ${index+1} / ${total}`;
  $('qText').textContent = q;
  const shapes = ['▲','♦','●','■'];
  $('qChoices').innerHTML = choices.map((c, i) =>
    `<div class="choice c${i}"><span class="sh">${shapes[i]}</span>${esc(c)}</div>`
  ).join('');
  $('qProgressInfo').textContent = '';
  startTimer(timeLimit);
  show('playing');
});

socket.on('tick', () => {});

function startTimer(dur) {
  if (timerRAF) { cancelAnimationFrame(timerRAF); timerRAF = null; }
  qStartTs = Date.now();
  function frame() {
    const pct   = Math.max(0, (1 - (Date.now() - qStartTs) / 1000 / dur) * 100);
    const color = pct > 55 ? '#10b981' : pct > 25 ? '#f59e0b' : '#ef4444';
    $('timerBar').style.width = pct + '%';
    $('timerBar').style.background = color;
    if (pct > 0) timerRAF = requestAnimationFrame(frame);
  }
  timerRAF = requestAnimationFrame(frame);
}

socket.on('host:progress', ({ answered, total }) => {
  $('qProgressInfo').textContent = `${answered} / ${total}명 답변`;
});

socket.on('answer:reveal', ({ answerText }) => {
  $('bigAnswer').textContent = answerText;
  show('answering');
});

socket.on('ranking:show', ({ leaderboard, isLast }) => {
  $('rankingTitle').textContent = isLast ? '🏆 최종 순위' : '🏆 현재 순위';
  renderRanking('rankList', leaderboard);
  show('ranking');
});

socket.on('game:ended', ({ leaderboard }) => {
  const rankCls = ['r1','r2','r3'];
  const medals  = ['🥇','🥈','🥉'];
  $('winOverlay').innerHTML = leaderboard.map((p, i) =>
    `<div class="win-name ${rankCls[i] || 'rx'}">${medals[i] || `${i+1}위`} ${esc(p.nick)}</div>`
  ).join('');

  const vid = $('winVideo');
  vid.currentTime = 0;
  vid.play().catch(() => {});

  show('ended');
});

function renderRanking(id, board) {
  const tiers = ['t1','t2','t3'];
  $(id).innerHTML = board.map((p, i) => {
    const tier  = tiers[i] || '';
    const medal = ['🥇','🥈','🥉'][i] || `${i+1}위`;
    return `<div class="rrow ${tier}" style="animation-delay:${i*.08}s">
      <span class="rmedal">${medal}</span>
      <span class="rnick">${esc(p.nick)}</span>
      <span class="rscore">${p.score}점</span>
    </div>`;
  }).join('');
}

socket.on('error:msg', msg => alert(msg));
function esc(s) {
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
