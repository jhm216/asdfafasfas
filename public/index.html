<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>QuizN Clone</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .card { background:#fff; color:#222; padding:48px; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,.2); text-align:center; max-width:420px; width:90%; }
  h1 { margin:0 0 8px; font-size:36px; }
  p { color:#666; margin-bottom:32px; }
  .btns { display:flex; gap:12px; }
  a.btn { flex:1; padding:16px; border-radius:8px; text-decoration:none; font-weight:600; }
  .host { background:#6366f1; color:#fff; }
  .play { background:#f3f4f6; color:#222; }
</style>
</head>
<body>
  <div class="card">
    <h1>🎯 QuizN Clone</h1>
    <p>실시간 퀴즈를 만들어보세요</p>
    <div class="btns">
      <a class="btn host" href="/host">방 만들기 (호스트)</a>
      <a class="btn play" href="/play">참여하기 (플레이어)</a>
    </div>
  </div>
</body>
</html>
