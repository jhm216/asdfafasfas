<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>플레이어 - QuizN Clone</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="/socket.io/socket.io.js"></script>
<style>
  * { box-sizing:border-box; }
  body { font-family:-apple-system, sans-serif; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; margin:0; min-height:100vh; padding:20px; }
  .container { max-width:500px; margin:0 auto; }
  .card { background:#fff; color:#222; padding:24px; border-radius:16px; margin-bottom:16px; }
  input { width:100%; padding:16px; font-size:20px; border:2px solid #e5e7eb; border-radius:8px; margin-bottom:12px; }
  input:focus { outline:none; border-color:#6366f1; }
  button.primary { width:100%; background:#6366f1; color:#fff; border:none; padding:16px; font-size:18px; font-weight:700; border-radius:8px; cursor:pointer; }
  button.primary:hover { background:#4f46e5; }

  /* 타이머 헤더 */
  .timer-bar { display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,.2); padding:12px 16px; border-radius:8px; margin-bottom:12px; font-weight:700; }
  .timer-num { font-size:24px; color:#fbbf24; }
  .timer-num.warning { color:#ef4444; animation:pulse .5s infinite; }
  @keyframes pulse { 50% { transform:scale(1.15); } }

  /* 선택지 */
  .q-text { font-size:18px; font-weight:700; margin:0 0 16px; color:#222; }
  .choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .choice-btn { padding:32px 12px; color:#fff; font-weight:800; font-size:18px; border:none; border-radius:8px; cursor:pointer; min-height:100px; word-break:keep-all; }
  .choice-btn.c0 { background:#ef4444; } .choice-btn.c1 { background:#3b82f6; }
  .choice-btn.c2 { background:#eab308; } .choice-btn.c3 { background:#22c55e; }
  .choice-btn:disabled { opacity:.3; }
  .choice-btn:active:not(:disabled) { transform:scale(.95); }

  /* 결과 */
  .result-big { text-align:center; font-size:56px; font-weight:900; margin:16px 0; }
  .result-big.correct { color:#22c55e; }
  .result-big.wrong { color:#ef4444; }
  .score-display { text-align:center; font-size:48px; font-weight:900; margin:8px 0; }
  .delta-display { text-align:center; color:#666; font-weight:700; }

  /* 랭킹 (모바일용) */
  .rank-list { display:flex; flex-direction:column; gap:8px; }
  .rank-row { display:flex; align-items:center; background:#f9fafb; border-radius:8px; padding:10px 14px; gap:10px; }
  .rank-row.me { background:#6366f1; color:#fff; transform:scale(1.05); }
  .rank-num { font-weight:900; min-width:40px; }
  .rank-nick { flex:1; font-weight:700; }
  .rank-score { font-weight:800; }

  .msg { text-align:center; padding:20px; font-size:20px; font-weight:700; }
  small { font-weight:400; color:#666; font-size:13px; }

  #join, #waiting, #answering, #answered, #revealing, #ranking, #finished { display:none; }
  .active { display:block !important; }
</style>
</head>
<body>
<div class="container">

  <div id="join" class="active">
    <div class="card">
      <h1 style="margin:0 0 16px;">🎯 참여하기</h1>
      <input id="pinInput" type="text" inputmode="numeric" maxlength="6" placeholder="PIN 6자리">
      <input id="nickInput" type="text" maxlength="16" placeholder="닉네임">
      <button class="primary" id="joinBtn">참여</button>
    </div>
  </div>

  <div id="waiting">
    <div class="card msg">
      ✅ 입장 완료!<br>
      <small>호스트가 시작하기를 기다리는 중...</small>
    </div>
  </div>

  <div id="answering">
    <div class="timer-bar">
      <span id="qNumber">문제 1</span>
      <span>⏱ <span class="timer-num" id="timer">00</span>초</span>
    </div>
    <div class="card">
      <div class="q-text" id="qTextPlayer"></div>
      <div class="choices">
        <button class="choice-btn c0" data-i="0">1</button>
        <button class="choice-btn c1" data-i="1">2</button>
        <button class="choice-btn c2" data-i="2">3</button>
        <button class="choice-btn c3" data-i="3">4</button>
      </div>
    </div>
  </div>

  <div id="answered">
    <div class="timer-bar">
      <span id="qNumberA">문제 1</span>
      <span>⏱ <span class="timer-num" id="timerA">00</span>초</span>
    </div>
    <div class="card msg">
      ⏳ 답안 제출 완료<br>
      <small>다른 사람들을 기다리는 중...</small>
    </div>
  </div>

  <div id="revealing">
    <div class="card">
      <div class="result-big" id="resultBig"></div>
      <div class="score-display" id="scoreBig">0점</div>
      <div class="delta-display"><span id="deltaBig">+0</span>점 획득</div>
    </div>
  </div>

  <div id="ranking">
    <div class="card">
      <h2 style="margin:0 0 16px; text-align:center;">🏆 현재 순위</h2>
      <div class="rank-list" id="rankList"></div>
    </div>
  </div>

  <div id="finished">
    <div class="card msg">
      🏁 게임 종료!<br>
      <div class="score-display" id="finalScore">0점</div>
      <small id="finalRankMsg"></small>
    </div>
    <div class="card">
      <h3 style="margin:0 0 12px;">최종 순위</h3>
      <div class="rank-list" id="finalRank"></div>
    </div>
  </div>

</div>

<script>
const socket = io();
const $ = id => document.getElementById(id);
const show = id => {
  ['join','waiting','answering','answered','revealing','ranking','finished'].forEach(s => $(s).classList.remove('active'));
  $(id).classList.add('active');
};

let myScore = 0;
let myNick = '';
let lastDelta = 0;
let lastCorrect = false;

$('joinBtn').onclick = () => {
  const pin = $('pinInput').value.trim();
  const nick = $('nickInput').value.trim();
  if (!pin || !nick) return alert('PIN과 닉네임을 모두 입력하세요');
  myNick = nick;
  socket.emit('player:join', { pin, nick });
};

socket.on('player:joined', () => show('waiting'));

socket.on('question:show', ({ index, total, q, choices, timeLimit }) => {
  $('qNumber').textContent = `문제 ${index+1} / ${total}`;
  $('qNumberA').textContent = `문제 ${index+1} / ${total}`;
  $('qTextPlayer').textContent = q;
  document.querySelectorAll('.choice-btn').forEach((btn,i) => {
    btn.disabled = false;
    btn.textContent = `${i+1}. ${choices[i] ?? ''}`;
  });
  $('timer').textContent = String(timeLimit).padStart(2,'0');
  $('timerA').textContent = String(timeLimit).padStart(2,'0');
  show('answering');
});

socket.on('tick', ({ remaining }) => {
  const s = String(remaining).padStart(2,'0');
  $('timer').textContent = s;
  $('timerA').textContent = s;
  const warn = remaining <= 5;
  $('timer').classList.toggle('warning', warn);
  $('timerA').classList.toggle('warning', warn);
});

document.querySelectorAll('.choice-btn').forEach(btn => {
  btn.onclick = () => {
    const i = parseInt(btn.dataset.i);
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    socket.emit('player:answer', { choice: i });
  };
});

socket.on('player:answered', ({ correct, delta, score }) => {
  myScore = score;
  lastDelta = delta;
  lastCorrect = correct;
  show('answered');
});

// === 정답 공개: 플레이어는 자기 결과를 봄 ===
socket.on('answer:reveal', () => {
  if (lastDelta === undefined && !$('answered').classList.contains('active')) {
    // 답을 안 낸 경우
    $('resultBig').textContent = '⏰ 시간 종료';
    $('resultBig').className = 'result-big wrong';
    $('deltaBig').textContent = '+0';
  } else {
    $('resultBig').textContent = lastCorrect ? '✅ 정답!' : '❌ 오답';
    $('resultBig').className = 'result-big ' + (lastCorrect ? 'correct' : 'wrong');
    $('deltaBig').textContent = '+' + lastDelta;
  }
  $('scoreBig').textContent = myScore + '점';
  show('revealing');
});

// === 랭킹 화면 ===
socket.on('ranking:show', ({ leaderboard }) => {
  renderRank('rankList', leaderboard, myNick);
  show('ranking');
});

socket.on('game:ended', ({ leaderboard }) => {
  const myRank = leaderboard.findIndex(p => p.nick === myNick);
  $('finalScore').textContent = myScore + '점';
  $('finalRankMsg').textContent = myRank >= 0 ? `${myRank+1}위 / ${leaderboard.length}명 중` : '';
  renderRank('finalRank', leaderboard, myNick);
  show('finished');
});

function renderRank(containerId, board, me) {
  $(containerId).innerHTML = board.map((p,i) => {
    const medal = ['🥇','🥈','🥉'][i] || `${i+1}위`;
    const isMe = p.nick === me ? 'me' : '';
    return `<div class="rank-row ${isMe}">
      <span class="rank-num">${medal}</span>
      <span class="rank-nick">${escapeHtml(p.nick)}</span>
      <span class="rank-score">${p.score}점</span>
    </div>`;
  }).join('');
}

socket.on('error:msg', msg => alert(msg));

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
